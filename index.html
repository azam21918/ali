<script>
    const schedule = {
        Saturday: [{label: "08:00 AM", task: "Coaching", icon: "🏫"}, {label: "11:00 AM", task: "University", icon: "🎓"}, {label: "02:00 PM", task: "Rest", icon: "🔋"}, {label: "04:30 PM", task: "Ashik", icon: "👤"}, {label: "06:30 PM", task: "Alvi", icon: "👤"}, {label: "09:00 PM", task: "Reading", icon: "📖"}],
        Sunday: [{label: "11:00 AM", task: "Abid", icon: "👤"}, {label: "02:00 PM", task: "Rest", icon: "🔋"}, {label: "04:30 PM", task: "Mahi", icon: "👤"}, {label: "06:30 PM", task: "Reading", icon: "📖"}, {label: "09:00 PM", task: "Reading", icon: "📖"}],
        Monday: [{label: "11:00 AM", task: "University", icon: "🎓"}, {label: "02:00 PM", task: "Rest", icon: "🔋"}, {label: "04:00 PM", task: "Ashik", icon: "👤"}, {label: "06:10 PM", task: "Coaching", icon: "🏫"}, {label: "08:00 PM", task: "Reading", icon: "📖"}],
        Tuesday: [{label: "08:00 AM", task: "Coaching", icon: "🏫"}, {label: "11:00 AM", task: "Abid", icon: "👤"}, {label: "02:00 PM", task: "Rest", icon: "🔋"}, {label: "04:30 PM", task: "Mahi", icon: "👤"}, {label: "07:00 PM", task: "Reading", icon: "📖"}, {label: "09:00 PM", task: "Reading", icon: "📖"}],
        Wednesday: [{label: "11:00 AM", task: "University", icon: "🎓"}, {label: "02:00 PM", task: "Rest", icon: "🔋"}, {label: "04:30 PM", task: "Ashik", icon: "👤"}, {label: "06:30 PM", task: "Alvi", icon: "👤"}, {label: "09:00 PM", task: "Reading", icon: "📖"}],
        Thursday: [{label: "11:00 AM", task: "Abid", icon: "👤"}, {label: "02:00 PM", task: "Rest", icon: "🔋"}, {label: "04:30 PM", task: "Mahi", icon: "👤"}, {label: "06:30 PM", task: "Alvi", icon: "👤"}, {label: "09:00 PM", task: "Reading", icon: "📖"}],
        Friday: [{label: "08:00 AM", task: "Coaching", icon: "🏫"}, {label: "11:00 AM", task: "Free Time", icon: "🌊"}]
    };

    let expenses = JSON.parse(localStorage.getItem('myExpenses')) || [];

    // Helper to calculate totals
    const getTotal = () => expenses.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);

    function updateView(day, el) {
        document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
        if(el) el.classList.add('active');
        const view = document.getElementById('taskViewport');
        view.innerHTML = "";

        if (day === 'Expenses') {
            view.innerHTML = `
                <div class="total-box">Month Total: ${getTotal().toFixed(2)} BDT</div>
                <div class="expense-card">
                    <select id="cat"><option>Bus Travel</option><option>Food Expense</option><option>Other</option></select>
                    <input type="number" id="amt" placeholder="Enter Amount (BDT)">
                    <button class="add-btn" onclick="addExpense()">ADD COST</button>
                    <button class="add-btn" style="background:#ef4444; margin-top:10px;" onclick="clearExpenses()">CLEAR ALL DATA</button>
                </div>
                <div id="list"></div>`;
            renderList();
        } else {
            (schedule[day] || []).forEach(item => {
                view.innerHTML += `<div class="task-item"><div class="time-label">${item.label}</div><div class="task-content"><div><strong>${item.task}</strong></div><div>${item.icon}</div></div></div>`;
            });
        }
    }

    function addExpense() {
        const cat = document.getElementById('cat').value;
        const amt = document.getElementById('amt').value;
        if(amt && !isNaN(amt)) {
            expenses.push({ cat, amount: amt, date: new Date().toLocaleDateString() });
            localStorage.setItem('myExpenses', JSON.stringify(expenses));
            updateView('Expenses');
        } else {
            alert("Please enter a valid amount");
        }
    }

    function clearExpenses() {
        if(confirm("Are you sure you want to delete all expenses?")) {
            expenses = [];
            localStorage.removeItem('myExpenses');
            updateView('Expenses');
        }
    }

    function renderList() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        expenses.slice().reverse().forEach(item => {
            list.innerHTML += `<div class="task-content" style="margin-bottom:10px; font-size:12px;">
                ${item.date} | <strong>${item.cat}</strong> <span>${item.amount} BDT</span>
            </div>`;
        });
    }

    function tick() {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // Auto-update dates on cards
    function initDates() {
        const cards = document.querySelectorAll('.day-card');
        const baseDate = new Date();
        cards.forEach((card, i) => {
            if (i < 7) {
                let d = new Date();
                d.setDate(d.getDate() + (i - d.getDay() + 1));
                card.querySelector('span:last-child').innerText = d.getDate().toString().padStart(2, '0');
            }
        });
    }

    setInterval(tick, 1000);
    initDates();
    tick();
    updateView('Saturday');
</script>
