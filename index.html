<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #808191;
            --success: #00f2fe;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(circle at 0% 0%, #131525 0%, #05070a 60%);
        }

        header { padding: 40px 25px 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .user-greet h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .user-greet p { margin: 0; color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .time-badge {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            color: var(--accent);
        }

        .day-scroller {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 25px 25px;
            scrollbar-width: none;
        }
        .day-scroller::-webkit-scrollbar { display: none; }
        
        .day-card {
            min-width: 60px;
            height: 80px;
            background: var(--glass);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .day-card span:first-child { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
        .day-card span:last-child { font-size: 16px; font-weight: 800; }
        .day-card.active {
            background: var(--accent);
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .viewport {
            flex: 1;
            background: rgba(255,255,255,0.01);
            border-radius: 40px 40px 0 0;
            padding: 30px 25px;
            overflow-y: auto;
            border-top: 1px solid var(--card-border);
        }

        .task-item { display: flex; gap: 15px; margin-bottom: 25px; position: relative; }
        .task-item:not(:last-child)::after {
            content: ''; position: absolute; left: 15px; top: 45px;
            width: 1px; height: calc(100% - 10px); background: var(--card-border);
        }

        .time-label { font-size: 10px; color: var(--text-dim); min-width: 55px; padding-top: 15px; font-weight: 600; }
        
        .task-content {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            cursor: pointer;
        }

        .task-content.active-now {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            background: rgba(99, 102, 241, 0.05);
        }

        .task-content.done { opacity: 0.3; filter: grayscale(1); transform: scale(0.98); }
        
        .icon-box {
            width: 44px; height: 44px; background: rgba(255,255,255,0.03);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-right: 12px;
        }

        .info h4 { margin: 0; font-size: 15px; font-weight: 700; }
        .info p { margin: 2px 0 0; font-size: 11px; color: var(--text-dim); }

        .checkbox {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid var(--card-border); transition: 0.3s;
        }
        .done .checkbox { background: var(--success); border-color: var(--success); box-shadow: 0 0 10px var(--success); }

        .report-fab {
            position: fixed; bottom: 30px; right: 25px;
            background: var(--accent); color: white;
            width: 60px; height: 60px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: none; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-row">
            <div class="user-greet">
                <p id="greet-text">LOADING...</p>
                <h1>Ali Azam</h1>
            </div>
            <div class="time-badge" id="live-clock">--:-- --</div>
        </div>
    </header>

    <div class="day-scroller" id="dayPicker">
        <div class="day-card" onclick="updateView('Saturday', this)"><span>SAT</span><span>25</span></div>
        <div class="day-card" onclick="updateView('Sunday', this)"><span>SUN</span><span>26</span></div>
        <div class="day-card" onclick="updateView('Monday', this)"><span>MON</span><span>27</span></div>
        <div class="day-card" onclick="updateView('Tuesday', this)"><span>TUE</span><span>28</span></div>
        <div class="day-card" onclick="updateView('Wednesday', this)"><span>WED</span><span>29</span></div>
        <div class="day-card" onclick="updateView('Thursday', this)"><span>THU</span><span>30</span></div>
        <div class="day-card" onclick="updateView('Friday', this)"><span>FRI</span><span>01</span></div>
    </div>

    <div class="viewport" id="taskViewport"></div>

    <button class="report-fab" onclick="mailReport()">📩</button>
</div>

<script>
    const schedule = {
        Saturday: [
            {h: 8, m: "00", label: "08:00 AM", task: "Coaching", icon: "🏫"},
            {h: 11, m: "00", label: "11:00 AM", task: "University", icon: "🎓"},
            {h: 14, m: "00", label: "02:00 PM", task: "Rest", icon: "🔋"},
            {h: 16, m: "30", label: "04:30 PM", task: "Ashik", icon: "👤"},
            {h: 18, m: "30", label: "06:30 PM", task: "Alvi", icon: "👤"},
            {h: 21, m: "00", label: "09:00 PM", task: "Reading", icon: "📖"}
        ],
        Sunday: [
            {h: 11, m: "00", label: "11:00 AM", task: "Abid", icon: "👤"},
            {h: 14, m: "00", label: "02:00 PM", task: "Rest", icon: "🔋"},
            {h: 16, m: "30", label: "04:30 PM", task: "Mahi", icon: "👤"},
            {h: 18, m: "30", label: "06:30 PM", task: "Reading", icon: "📖"},
            {h: 21, m: "00", label: "09:00 PM", task: "Reading", icon: "📖"}
        ],
        Monday: [
            {h: 11, m: "00", label: "11:00 AM", task: "University", icon: "🎓"},
            {h: 14, m: "00", label: "02:00 PM", task: "Rest", icon: "🔋"},
            {h: 16, m: "30", label: "04:00 PM", task: "Ashik", icon: "👤"},
            {h: 18, m: "30", label: "06:10 PM", task: "Coaching", icon: "🏫"},
            {h: 21, m: "00", label: "09:00 PM", task: "Reading", icon: "📖"}
        ],
        Tuesday: [
            {h: 8, m: "00", label: "08:00 AM", task: "Coaching", icon: "🏫"},
            {h: 11, m: "00", label: "11:00 AM", task: "Abid", icon: "👤"},
            {h: 14, m: "00", label: "02:00 PM", task: "Rest", icon: "🔋"},
            {h: 16, m: "30", label: "04:30 PM", task: "Mahi", icon: "👤"},
            {h: 18, m: "30", label: "06:30 PM", task: "Reading", icon: "📖"},
            {h: 21, m: "00", label: "09:00 PM", task: "Reading", icon: "📖"}
        ],
        Wednesday: [
            {h: 11, m: "00", label: "11:00 AM", task: "University", icon: "🎓"},
            {h: 14, m: "00", label: "02:00 PM", task: "Rest", icon: "🔋"},
            {h: 16, m: "30", label: "04:30 PM", task: "Ashik", icon: "👤"},
            {h: 18, m: "30", label: "06:30 PM", task: "Alvi", icon: "👤"},
            {h: 21, m: "00", label: "09:00 PM", task: "Reading", icon: "📖"}
        ],
        Thursday: [
            {h: 11, m: "00", label: "11:00 AM", task: "Abid", icon: "👤"},
            {h: 14, m: "00", label: "02:00 PM", task: "Rest", icon: "🔋"},
            {h: 16, m: "30", label: "04:30 PM", task: "Mahi", icon: "👤"},
            {h: 18, m: "30", label: "06:30 PM", task: "Alvi", icon: "👤"},
            {h: 21, m: "00", label: "09:00 PM", task: "Reading", icon: "📖"}
        ],
        Friday: [
            {h: 8, m: "00", label: "08:00 AM", task: "Coaching", icon: "🏫"},
            {h: 11, m: "00", label: "11:00 AM", task: "Free Time", icon: "🌊"}
        ]
    };

    let currentDay = "Saturday";

    function updateView(day, el) {
        currentDay = day;
        document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
        if(el) el.classList.add('active');
        
        const view = document.getElementById('taskViewport');
        view.innerHTML = "";

        const nowH = new Date().getHours();

        schedule[day].forEach(item => {
            const isActive = (nowH === item.h);
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <div class="time-label">${item.label}</div>
                <div class="task-content ${isActive ? 'active-now' : ''}" onclick="this.classList.toggle('done')">
                    <div style="display:flex; align-items:center;">
                        <div class="icon-box">${item.icon}</div>
                        <div class="info">
                            <h4>${item.task}</h4>
                            <p>${isActive ? 'ACTIVE NOW' : 'SCHEDULED'}</p>
                        </div>
                    </div>
                    <div class="checkbox"></div>
                </div>
            `;
            view.appendChild(div);
        });
    }

    function mailReport() {
        const done = Array.from(document.querySelectorAll('.task-content.done h4')).map(h => h.innerText);
        const body = `Report for ${currentDay}:%0D%0ACompleted: ${done.length > 0 ? done.join(', ') : 'None'}`;
        window.location.href = `mailto:aliazam70123@gmail.com?subject=Routine Sync&body=${body}`;
    }

    function tick() {
        const now = new Date();
        const clockStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('live-clock').innerText = clockStr;

        const hr = now.getHours();
        const greet = hr < 12 ? "MORNING FLOW" : hr < 17 ? "AFTERNOON FOCUS" : "EVENING CHILL";
        document.getElementById('greet-text').innerText = greet;
    }

    setInterval(tick, 1000);
    tick();

    // Auto-select logic
    const dNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const todayName = dNames[new Date().getDay()];
    const cards = document.querySelectorAll('.day-card');
    
    cards.forEach(c => {
        // Match the short name in the first span (e.g., "SUN")
        if(c.querySelector('span').innerText === todayName.substring(0,3).toUpperCase()) {
            updateView(todayName, c);
            c.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
    });
</script>
</body>
</html>
